<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Family Planner</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
  <link rel="manifest" href="/family-planner/manifest.json">
  
  <meta name="theme-color" content="#4CAF50">
  
  <!-- iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Planner">
  
  <link rel="apple-touch-icon" href="/family-planner/icon-192.png">
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .calendar div {
    text-align: center;
    }

    .day {
      border: 1px solid #ccc;
      padding: 10px;
      cursor: pointer;
      min-height: 80px;
    }
    .selected { background: #cce5ff; }
    .range { background: #d4edda; }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay-content {
      background: white;
      padding: 20px;
      width: 300px;
    }
  </style>
</head>
<body>

<div id="auth"></div>

<!-- ГОЛОВНЕ МЕНЮ -->
<div id="homeView">

  <h2>📅 Календар меню</h2>

  <div>
    <button onclick="setMonth(-1)">←</button>
    <span id="monthLabel"></span>
    <button onclick="setMonth(1)">→</button>
  </div>

  <br>

  <div class="calendar" id="calendar"></div>

  <br>

  <button onclick="showView('recipesView')">🍲 Рецепти</button>
  <button onclick="showView('productsView')">🥕 Редагувати БД продуктів</button>
  <button onclick="showView('shoppingView')">🛒 Список покупок</button>
  <button onclick="showView('pantryView')">📦 Запаси</button>
  <button onclick="showView('buyView')">💰 Купити продукт</button>

</div>

<div id="recipesView" style="display:none">
  <button onclick="showView('homeView')">← Назад</button>

  <h2>🍲 Рецепти</h2>

  <input id="recipeName" placeholder="Назва рецепта">
  <button onclick="addRecipe()">Додати</button>

  <br><br>

  <div id="recipesList"></div>

  <hr>

  <div id="recipeEditor" style="display:none">
    <h3 id="recipeTitle"></h3>

    <select id="ingredientProduct"></select>
    <input id="ingredientQty" placeholder="Кількість" type="number">

    <button onclick="addIngredient()">Додати інгредієнт</button>

    <div id="ingredientsList"></div>
  </div>
</div>


<!-- ПРОДУКТИ -->
<div id="productsView" style="display:none">
  <button onclick="showView('homeView')">← Назад</button>

  <h2>🥕 Продукти</h2>

  <div>
    <input id="productName" placeholder="Назва">
    <input id="productUnit" placeholder="Одиниця">
    <input id="productCalories" placeholder="Ккал" type="number">
    <button onclick="addProduct()">Додати</button>
  </div>

  <br>

  <div id="productsList"></div>
</div>

<!-- ПОКУПКИ -->
<div id="shoppingView" style="display:none">
  <button onclick="showView('homeView')">← Назад</button>

  <h2>🛒 Список покупок</h2>

  <div id="shoppingList"></div>
</div>

<!-- ЗАПАСИ -->
<div id="pantryView" style="display:none">
  <button onclick="showView('homeView')">← Назад</button>

  <h2>📦 Запаси</h2>

  <div id="pantryList"></div>
</div>

<!-- КУПИТИ -->
<div id="buyView" style="display:none">
  <button onclick="showView('homeView')">← Назад</button>

  <h2>💰 Купити продукт</h2>

  <select id="buyProduct"></select>
  <input id="buyQty" placeholder="Кількість" type="number">
  <input id="buyPrice" placeholder="Ціна" type="number">

  <button onclick="buyProduct()">Купити</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h3 id="overlayDate"></h3>

    <select id="recipeId"></select>
    <input id="portions" type="number">

    <br><br>

    <button onclick="saveDay()">Зберегти</button>
    <button onclick="closeOverlay()">Закрити</button>
  </div>
</div>

let selectedEnd = null;

let currentRecipeId = null;
let ingredients = [];

async function login() {

async function init() {
  const { data } = await supabase.auth.getSession();

  user = data.session?.user || null;

  await loadRecipes()

  await loadMenu();

  await loadProducts();
  fillBuyDropdown();
  await loadPantry();

  renderAuthUI();

async function logout() {
  await supabase.auth.signOut();
  user = null;
  renderAuthUI();

}

function renderAuthUI() {
  const auth = document.getElementById('auth');

  if (user) {
    auth.innerHTML = `
      <div>
        👤 ${user.email}
        <button onclick="logout()">Вийти</button>

}

function showView(viewId) {
  const views = [
    'homeView',
    'productsView',
    'shoppingView',
    'pantryView',
    'buyView',
    'recipesView'
  ];

  views.forEach(v => {
    document.getElementById(v).style.display =
      (v === viewId) ? 'block' : 'none';
  });

  // автозавантаження даних
  if (viewId === 'productsView') {
    loadProducts().then(fillProductDropdown);
  }
  if (viewId === 'pantryView') loadPantry();
  if (viewId === 'buyView') fillBuyDropdown();
  if (viewId === 'shoppingView') {
    loadShoppingList();
  }
  if (viewId === 'recipesView') {
    Promise.all([loadRecipes(), loadProducts()])
      .then(() => {
        renderRecipes();
        fillIngredientDropdown();
      });
  }

}


function setMonth(offset) {
  currentDate.setMonth(currentDate.getMonth() + offset);
  renderCalendar();
}

function renderCalendar() {
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById('monthLabel').innerText =
    `${year}-${month + 1}`;

  let firstDay = new Date(year, month, 1).getDay();
  firstDay = (firstDay === 0) ? 6 : firstDay - 1;

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // ✅ 1. назви днів (ЗАВЖДИ перший рядок)
  const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

  dayNames.forEach(d => {
    const el = document.createElement('div');
    el.style.textAlign = 'center';
    el.style.fontWeight = 'bold';
    el.innerText = d;
    calendar.appendChild(el);
  });

  // ✅ 2. пусті клітинки перед 1 числом
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    calendar.appendChild(empty);
  }

  // ✅ 3. дні
  for (let d = 1; d <= daysInMonth; d++) {
    const date = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const el = document.createElement('div');
    el.className = 'day';

    const items = getMenuForDate(date);

    el.innerHTML = `
    <div><b>${d}</b></div>
    <div style="font-size:12px;">
        ${items.map(i => {
        const r = recipes.find(r => r.id === i.recipe_id);
        return r ? `🍲 ${r.name}` : '';
        }).join('<br>')}
    </div>

    <button onclick="consumeDay('${date}')">✔</button>
    `;

    el.onclick = () => selectDate(date);

    if (isInRange(date)) el.classList.add('range');
    if (date === selectedStart || date === selectedEnd) el.classList.add('selected');

    el.ondblclick = () => openOverlay(date);

    calendar.appendChild(el);
  }
}
function selectDate(date) {
  if (!selectedStart || (selectedStart && selectedEnd)) {
    selectedStart = date;
    selectedEnd = null;
  } else {
    selectedEnd = date;
  }
  renderCalendar();
}

function isInRange(date) {
  if (!selectedStart || !selectedEnd) return false;
  return date >= selectedStart && date <= selectedEnd;
}

function openOverlay(date) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('overlayDate').innerText = date;
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

async function saveDay() {
  const date = document.getElementById('overlayDate').innerText;
  const recipe_id = document.getElementById('recipeId').value;
  const portions = document.getElementById('portions').value;

  await supabase.from('menu').insert({
    date,
    recipe_id,
    portions,
    user_id: user.id
  });

  await loadMenu();
  renderCalendar();
  closeOverlay();
}

async function calculate() {
  if (!selectedStart || !selectedEnd) {
    alert('Вибери діапазон');
    return;
  }

  const { data } = await supabase.rpc('get_shopping_cost', {
    p_user_id: user.id,
    p_date_from: selectedStart,
    p_date_to: selectedEnd
  });

  document.getElementById('output').innerText =
    JSON.stringify(data, null, 2);
}

async function loadRecipes() {
  const { data } = await supabase
    .from('recipes')
    .select('id, name');

  recipes = data || [];
}

function fillRecipeDropdown() {
  const select = document.getElementById('recipeId');

  select.innerHTML = recipes.map(r =>
    `<option value="${r.id}">${r.name}</option>`
  ).join('');
}

async function loadMenu() {
  const { data } = await supabase
    .from('menu')
    .select('date, recipe_id, portions');

  menu = data || [];
}

function getMenuForDate(date) {
  return menu.filter(m => m.date === date);
}

async function loadProducts() {
  const { data } = await supabase
    .from('products')
    .select('*')
    .order('name');

  products = data || [];
  renderProducts();
}

function renderProducts() {
  const el = document.getElementById('productsList');

  el.innerHTML = products.map(p => `
    <div style="border:1px solid #ccc; padding:8px; margin:5px;">
      <input value="${p.name}" onchange="updateProduct('${p.id}', 'name', this.value)">
      <input value="${p.unit}" style="width:60px" onchange="updateProduct('${p.id}', 'unit', this.value)">
      
      <button onclick="deleteProduct('${p.id}')">❌</button>
      
      <div style="font-size:12px; color:gray;">
        ID: ${p.id}
      </div>
    </div>
  `).join('');
}

async function updateProduct(id, field, value) {
  await supabase
    .from('products')
    .update({ [field]: value })
    .eq('id', id);
}

async function deleteProduct(id) {
  if (!confirm('Видалити продукт?')) return;

  await supabase.from('products').delete().eq('id', id);
  await loadProducts();
}

async function addProduct() {
  if (!user) {
    alert('Спочатку увійди');
    return;
  }

  const name = document.getElementById('productName').value;
  const unit = document.getElementById('productUnit').value;
  const calories = document.getElementById('productCalories').value;

  if (!name || !unit) {
    alert('Заповни назву і одиницю');
    return;
  }

  const { error } = await supabase.from('products').insert({
    name,
    unit,
    calories_per_unit: calories || null,
    user_id: user.id
  });

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById('productName').value = '';
  document.getElementById('productUnit').value = '';
  document.getElementById('productCalories').value = '';

  await loadProducts();
}

async function addPrice() {
  const product_id = document.getElementById('priceProductId').value;
  const price = document.getElementById('priceValue').value;
  const date = document.getElementById('priceDate').value;

  await supabase.from('product_prices').insert({
    product_id,
    price,
    date_from: date,
    user_id: user.id
  });

  alert('Ціну додано');
}

function fillProductDropdown() {
  const select = document.getElementById('priceProductId');

  select.innerHTML = products.map(p =>
    `<option value="${p.id}">${p.name}</option>`
  ).join('');
}

function fillBuyDropdown() {
  const el = document.getElementById('buyProduct');

  el.innerHTML = products.map(p =>
    `<option value="${p.id}">${p.name}</option>`
  ).join('');
}

async function buyProduct() {
  const product_id = document.getElementById('buyProduct').value;
  const quantity = parseFloat(document.getElementById('buyQty').value);
  const price = parseFloat(document.getElementById('buyPrice').value);

  if (!product_id || !quantity || !price) {
    alert('Заповни всі поля');
    return;
  }

  const total = quantity * price;

  // 1. запис покупки
  await supabase.from('purchases').insert({
    user_id: user.id,
    product_id,
    quantity,
    price_per_unit: price,
    total_price: total
  });

  // 2. запис в історію цін
  await supabase.from('product_prices').insert({
    product_id,
    price,
    date_from: new Date().toISOString().slice(0,10),
    user_id: user.id
  });

  // 3. оновлення запасів
  const { data } = await supabase
    .from('pantry')
    .select('*')
    .eq('product_id', product_id)
    .eq('user_id', user.id)
    .single();

  if (data) {
    await supabase
      .from('pantry')
      .update({ quantity: data.quantity + quantity })
      .eq('id', data.id);
  } else {
    await supabase.from('pantry').insert({
      product_id,
      quantity,
      user_id: user.id
    });
  }

  alert('Куплено ✅');
}

async function loadPantry() {
  const { data } = await supabase
    .from('pantry')
    .select('*');

  renderPantry(data || []);
}

function renderPantry(items) {
  const el = document.getElementById('pantryList');

  el.innerHTML = items.map(i => {
    const p = products.find(p => p.id === i.product_id);

    return `
      <div>
        ${p?.name || '?'} — ${i.quantity}
      </div>
    `;
  }).join('');
}

async function loadShoppingList() {
  const { data } = await supabase.rpc('get_shopping_list_with_pantry', {
    p_user_id: user.id,
    p_date_from: selectedStart,
    p_date_to: selectedEnd
  });

  renderShoppingList(data || []);
}

function renderShoppingList(items) {
  const el = document.getElementById('shoppingList');

  el.innerHTML = items.map(i => `
    <div style="border:1px solid #ccc; padding:8px; margin:5px;">
      
      <b>${i.product_name}</b><br>

      Треба: ${i.needed} <br>

      <input id="price_${i.product_id}" placeholder="ціна" type="number">

      <button onclick="buyFromList('${i.product_id}', ${i.to_buy})">
        Купити
      </button>

  `).join('');
}

    .select('*')

  if (data) {
    await supabase

      .update({ quantity: data.quantity + quantity })
      .eq('id', data.id);
  } else {
    await supabase.from('pantry').insert({
      product_id,
      quantity,
      user_id: user.id
    });
  }

  // 🔥 ПЕРЕЗАВАНТАЖИТИ СПИСОК
  await loadShoppingList();
}

}

async function consumeDay(date) {
  if (!confirm('Списати продукти за цей день?')) return;

  // 1. отримати меню на день
  const { data: menuItems } = await supabase
    .from('menu')
    .select('recipe_id, portions')
    .eq('date', date)
    .eq('user_id', user.id);

  for (const m of menuItems) {

    // 2. інгредієнти рецепту
    const { data: ingredients } = await supabase
      .from('recipe_ingredients')
      .select('product_id, quantity')
      .eq('recipe_id', m.recipe_id);

    for (const ing of ingredients) {

      const needed = ing.quantity * m.portions;

      // 3. знайти в pantry
      const { data: stock } = await supabase
        .from('pantry')
        .select('*')
        .eq('product_id', ing.product_id)
        .eq('user_id', user.id)
        .single();

    if (stock && stock.quantity < needed) {
      alert('Не вистачає продуктів!');
      return;
    }        

      if (!stock) continue;

      const newQty = Math.max(stock.quantity - needed, 0);

      // 4. оновити pantry
      await supabase
        .from('pantry')
        .update({ quantity: newQty })
        .eq('id', stock.id);

      // 5. лог
      await supabase.from('pantry_usage').insert({
        user_id: user.id,
        product_id: ing.product_id,
        quantity: needed,
        source: 'menu'
      });
    }
  }

  alert('Списано ✅');

  await loadPantry();
}

async function addRecipe() {
  if (!user) {
    alert('Спочатку увійди');
    return;
  }

  const name = document.getElementById('recipeName').value;

  if (!name) {
    alert('Введи назву');
    return;
  }

  const { error } = await supabase.from('recipes').insert({
    name,
    user_id: user.id
  });

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  document.getElementById('recipeName').value = '';

  await loadRecipes();
  renderRecipes();
}

function renderRecipes() {
  const el = document.getElementById('recipesList');

  el.innerHTML = recipes.map(r => `
    <div style="border:1px solid #ccc; margin:5px; padding:5px;">
      <b>${r.name}</b>

      <button onclick="openRecipe('${r.id}', '${r.name}')">
        ✏️
      </button>
    </div>
  `).join('');
}

async function openRecipe(id, name) {
  currentRecipeId = id;

  document.getElementById('recipeEditor').style.display = 'block';
  document.getElementById('recipeTitle').innerText = name;

  await loadIngredients();
  renderIngredients();
  fillIngredientDropdown();
}

async function loadIngredients() {
  const { data } = await supabase
    .from('recipe_ingredients')
    .select('*')
    .eq('recipe_id', currentRecipeId);

  ingredients = data || [];
}

async function addIngredient() {
  const product_id = document.getElementById('ingredientProduct').value;
  const quantity = parseFloat(document.getElementById('ingredientQty').value);

  if (!product_id || !quantity) return;

  await supabase.from('recipe_ingredients').insert({
    recipe_id: currentRecipeId,
    product_id,
    quantity
  });

  document.getElementById('ingredientQty').value = '';

  await loadIngredients();
  renderIngredients();
}

function renderIngredients() {
  const el = document.getElementById('ingredientsList');

  el.innerHTML = ingredients.map(i => {
    const p = products.find(p => p.id === i.product_id);

    return `
      <div style="margin:5px;">
        ${p?.name || '?'} — ${i.quantity}

        <button onclick="deleteIngredient('${i.id}')">❌</button>
      </div>
    `;
  }).join('');
}

async function deleteIngredient(id) {
  await supabase.from('recipe_ingredients').delete().eq('id', id);

  await loadIngredients();
  renderIngredients();
}

function fillIngredientDropdown() {
  const el = document.getElementById('ingredientProduct');

  el.innerHTML = products.map(p =>
    `<option value="${p.id}">${p.name} (${p.unit})</option>`
  ).join('');
}

  navigator.serviceWorker.register('/family-planner/sw.js')
    .then(reg => {
      console.log('SW registered');

      // авто-оновлення
      reg.onupdatefound = () => {

          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('New version available');

            if (confirm('Оновити додаток?')) {
              window.location.reload();
            }
          }
        };

    });
}
