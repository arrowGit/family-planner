<!-- index.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Planner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="/family-planner/manifest.json" />

  <meta name="theme-color" content="#4CAF50" />

  <link rel="stylesheet" href="styles.css" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

<div id="auth"></div>

<div id="menuView">
  <input type="date" id="date">

  <div id="menuContainer"></div>
</div>

<!-- модалка -->
<div class="overlay" id="menuModal">
  <div class="overlay-content">
    <h3>Додати</h3>

    <select id="itemType">
      <option value="recipe">Страва</option>
      <option value="product">Продукт</option>
    </select>

    <select id="itemSelect"></select>

    <input id="quantity" type="number" placeholder="Кількість / порції">

    <button onclick="saveMenuItem()">Додати</button>
    <button onclick="closeModal()">Закрити</button>
  </div>
</div>
  
<div id="app" style="display:none">
  <h2>📅 Меню</h2>

  <input type="date" id="date" />
  <button id="loadDay">Завантажити</button>

  <div id="menu"></div>

  <h3>➕ Додати</h3>

  <select id="itemType">
    <option value="product">Продукт</option>
    <option value="recipe">Страва</option>
  </select>

  <select id="itemSelect"></select>

  <input id="quantity" type="number" placeholder="кількість/порції" />

  <select id="meal">
    <option value="breakfast">Сніданок</option>
    <option value="lunch">Обід</option>
    <option value="dinner">Вечеря</option>
    <option value="snack">Перекус</option>
  </select>

  <button id="addItem">Додати</button>

  <hr />

  <h2>📦 Запаси</h2>
  <div id="inventory"></div>

  <hr />

  <h2>🛒 Покупки</h2>
  <button id="calcShopping">Розрахувати</button>
  <div id="shopping"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
