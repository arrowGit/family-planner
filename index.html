<!-- index.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Planner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="/family-planner/manifest.json" />

  <meta name="theme-color" content="#4CAF50" />

  <link rel="stylesheet" href="styles.css" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

<div id="auth"></div>

<div id="app" style="display:none;">

  <!-- TOPBAR -->
  <div id="topbar" class="topbar"></div>

  <!-- TABS -->
  <div id="tabs" class="tabs">
    <button data-tab="menu" class="active">📅 Меню</button>
    <button data-tab="inventory">📦 Склад</button>
    <button data-tab="shopping">🛒 Покупки</button>
    <button data-tab="db">🧠 База</button>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- MENU -->
    <div class="tab" id="tab-menu">
      <div id="calendar"></div>
      <div id="menuContainer"></div>
    </div>

    <!-- INVENTORY -->
    <div class="tab" id="tab-inventory" style="display:none;">
      <div id="inventory"></div>
    </div>

    <!-- SHOPPING -->
    <div class="tab" id="tab-shopping" style="display:none;">
      <button onclick="calcShopping()">Розрахувати</button>
      <div id="shopping"></div>
    </div>

    <!-- RECIPES AND PRODUCTS  -->
    <div id="tab-db" class="tab" style="display:none;">
    
      <h3>Продукти</h3>
    
      <input id="productName" placeholder="Назва">
      <input id="productUnit" placeholder="Одиниця (кг, шт)">
      <input id="productCalories" type="number" placeholder="Ккал">
    
      <button onclick="addProduct()">Додати продукт</button>
    
      <div id="productsList"></div>
    
      <hr>
    
      <h3>Рецепти</h3>
    
      <input id="recipeName" placeholder="Назва рецепту">
      <button onclick="addRecipe()">Додати рецепт</button>
    
      <div id="recipesList"></div>
    
    </div>

  </div>

</div>
<script type="module" src="app.js"></script>
</body>
</html>
